name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Focus Retro ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download and install Focus Retro.

            **macOS**: download the `.dmg`
            **Windows**: download the `.msi` or `.exe`
          args: ${{ matrix.args }}

      - name: Attest macOS build provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg

      - name: Attest Windows build provenance
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Build offline variant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPDATER: "false"
        run: npx tauri build --config src-tauri/offline.conf.json ${{ matrix.args }} -- --no-default-features

      - name: Rename and upload offline artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dmg in src-tauri/target/**/release/bundle/dmg/*.dmg; do
            offline="${dmg%.dmg}_offline.dmg"
            mv "$dmg" "$offline"
            gh release upload ${{ github.ref_name }} "$offline" --clobber
          done

      - name: Rename and upload offline artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Recurse -Filter "*.exe" src-tauri/target/release/bundle/nsis | ForEach-Object {
            $offline = $_.FullName -replace '\.exe$', '_offline.exe'
            Move-Item $_.FullName $offline
            gh release upload ${{ github.ref_name }} $offline --clobber
          }

      - name: Attest offline macOS build provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/dmg/*_offline.dmg

      - name: Attest offline Windows build provenance
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/release/bundle/nsis/*_offline.exe
