name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Focus Retro ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download and install Focus Retro.

            **macOS**: download the `.dmg` for your chip - `aarch64` for Apple Silicon (M1+) or `x86_64` for Intel.
            **Windows**: download and run the `.exe` installer.

            The `_offline` variants are identical but with auto-update disabled - no outbound network connections.

            > The `.app.tar.gz` and `.sig` files are used for auto-updates and can be ignored.
          args: ${{ matrix.args }}

      - name: Attest macOS build provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg

      - name: Attest Windows build provenance
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Build offline variant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPDATER: "false"
        run: npx tauri build --config src-tauri/offline.conf.json ${{ matrix.args }} -- --no-default-features

      - name: Rename and upload offline artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dmg in src-tauri/target/**/release/bundle/dmg/*.dmg; do
            offline="${dmg%.dmg}_offline.dmg"
            mv "$dmg" "$offline"
            gh release upload ${{ github.ref_name }} "$offline" --clobber
          done

      - name: Rename and upload offline artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Recurse -Filter "*.exe" src-tauri/target/release/bundle/nsis | ForEach-Object {
            $offline = $_.FullName -replace '\.exe$', '_offline.exe'
            Move-Item $_.FullName $offline
            gh release upload ${{ github.ref_name }} $offline --clobber
          }

      - name: Attest offline macOS build provenance
        if: matrix.platform == 'macos-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/dmg/*_offline.dmg

      - name: Attest offline Windows build provenance
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/nsis/*_offline.exe
