pre-commit:
  commands:
    oxfmt:
      glob: "**/*.{ts,tsx,js,jsx,json,html,css,md}"
      run: npx oxfmt {staged_files} && git add {staged_files}
    oxlint:
      glob: "*.{ts,tsx}"
      run: npx oxlint {staged_files}
    cargo-fmt:
      glob: "src-tauri/**/*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml && git add {staged_files}
